<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" font-family="Segoe UI, Calibri, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F6B5C"/>
    </marker>
    <marker id="ahAmber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C98A1B"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="62" text-anchor="middle" font-size="40" font-weight="700" fill="#0A4A40">OBE Course Manager — One Semester Workflow</text>
  <text x="800" y="98" text-anchor="middle" font-size="20" font-style="italic" fill="#1F2D3D">Outcome-Based Education per the BAETE / Washington Accord framework</text>

  <!-- ======== CARDS ======== -->
  <!-- Card template pieces are drawn per card. Row1 y=130, Row2 y=470, h=270, w=330. Cols x: 40,436,832,1228 -->

  <!-- 1 Course Info -->
  <g>
    <rect x="40" y="130" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="76" cy="166" r="18" fill="#0A4A40"/><text x="76" y="173" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">1</text>
    <circle cx="205" cy="215" r="45" fill="#E6F2F0"/>
    <g stroke="#0F6B5C" stroke-width="3.5" fill="none" stroke-linecap="round">
      <rect x="185" y="192" width="40" height="48" rx="4"/>
      <rect x="196" y="186" width="18" height="10" rx="3" fill="#E6F2F0"/>
      <path d="M193,206 l5,5 l8,-9"/><line x1="193" y1="222" x2="217" y2="222"/><line x1="193" y1="231" x2="212" y2="231"/>
    </g>
    <text x="205" y="298" text-anchor="middle" font-size="21" font-weight="700" fill="#0A4A40">Course Info</text>
    <line x1="90" y1="312" x2="320" y2="312" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="205" y="338" text-anchor="middle" font-size="15" fill="#1F2D3D">Course details, cohort &amp;</text>
    <text x="205" y="358" text-anchor="middle" font-size="15" fill="#1F2D3D">attainment thresholds</text>
  </g>

  <!-- 2 Course Outcomes -->
  <g>
    <rect x="436" y="130" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="472" cy="166" r="18" fill="#0A4A40"/><text x="472" y="173" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">2</text>
    <circle cx="601" cy="215" r="45" fill="#E6F2F0"/>
    <g stroke="#0F6B5C" stroke-width="3.5" fill="none" stroke-linecap="round">
      <circle cx="601" cy="215" r="26"/><circle cx="601" cy="215" r="15"/><circle cx="601" cy="215" r="4" fill="#0F6B5C"/>
      <line x1="601" y1="215" x2="626" y2="190"/><path d="M626,190 l8,-2 l-2,8 z" fill="#0F6B5C"/>
    </g>
    <text x="601" y="298" text-anchor="middle" font-size="21" font-weight="700" fill="#0A4A40">Course Outcomes</text>
    <line x1="486" y1="312" x2="716" y2="312" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="601" y="338" text-anchor="middle" font-size="15" fill="#1F2D3D">Write COs with Bloom's</text>
    <text x="601" y="358" text-anchor="middle" font-size="15" fill="#1F2D3D">levels; map to the 12 POs</text>
  </g>

  <!-- 3 T&L Activities -->
  <g>
    <rect x="832" y="130" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="868" cy="166" r="18" fill="#0A4A40"/><text x="868" y="173" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">3</text>
    <circle cx="997" cy="215" r="45" fill="#E6F2F0"/>
    <g stroke="#0F6B5C" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M997,192 a17,17 0 0 1 9,31 c-3,2 -4,6 -4,9 h-10 c0,-3 -1,-7 -4,-9 a17,17 0 0 1 9,-31 z"/>
      <line x1="990" y1="239" x2="1004" y2="239"/><line x1="992" y1="246" x2="1002" y2="246"/>
      <line x1="997" y1="180" x2="997" y2="186"/><line x1="972" y1="215" x2="966" y2="215"/><line x1="1028" y1="215" x2="1022" y2="215"/>
      <line x1="979" y1="197" x2="975" y2="193"/><line x1="1015" y1="197" x2="1019" y2="193"/>
    </g>
    <text x="997" y="298" text-anchor="middle" font-size="21" font-weight="700" fill="#0A4A40">T&amp;L Activities</text>
    <line x1="882" y1="312" x2="1112" y2="312" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="997" y="338" text-anchor="middle" font-size="15" fill="#1F2D3D">Adopt recommended</text>
    <text x="997" y="358" text-anchor="middle" font-size="15" fill="#1F2D3D">activities per CO (CQI-aware)</text>
  </g>

  <!-- 4 Assessments -->
  <g>
    <rect x="1228" y="130" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="1264" cy="166" r="18" fill="#0A4A40"/><text x="1264" y="173" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">4</text>
    <circle cx="1393" cy="215" r="45" fill="#E6F2F0"/>
    <g stroke="#0F6B5C" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M1373,190 h28 l10,10 v42 h-38 z"/><path d="M1401,190 v10 h10"/>
      <line x1="1381" y1="230" x2="1405" y2="230"/><line x1="1381" y1="238" x2="1399" y2="238"/>
    </g>
    <text x="1393" y="212" text-anchor="middle" font-size="18" font-weight="700" fill="#0F6B5C">?</text>
    <text x="1393" y="298" text-anchor="middle" font-size="21" font-weight="700" fill="#0A4A40">Assessments</text>
    <line x1="1278" y1="312" x2="1508" y2="312" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="1393" y="338" text-anchor="middle" font-size="15" fill="#1F2D3D">Tag every exam question</text>
    <text x="1393" y="358" text-anchor="middle" font-size="15" fill="#1F2D3D">with a CO and marks</text>
  </g>

  <!-- 5 Students & Marks -->
  <g>
    <rect x="40" y="470" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="76" cy="506" r="18" fill="#0A4A40"/><text x="76" y="513" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">5</text>
    <circle cx="205" cy="555" r="45" fill="#E6F2F0"/>
    <g stroke="#0F6B5C" stroke-width="3.5" fill="none" stroke-linecap="round">
      <rect x="181" y="533" width="48" height="44" rx="4"/>
      <line x1="181" y1="547" x2="229" y2="547"/><line x1="181" y1="562" x2="229" y2="562"/>
      <line x1="197" y1="533" x2="197" y2="577"/><line x1="213" y1="533" x2="213" y2="577"/>
    </g>
    <text x="205" y="638" text-anchor="middle" font-size="21" font-weight="700" fill="#0A4A40">Students &amp; Marks</text>
    <line x1="90" y1="652" x2="320" y2="652" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="205" y="678" text-anchor="middle" font-size="15" fill="#1F2D3D">Enroll students; enter or</text>
    <text x="205" y="698" text-anchor="middle" font-size="15" fill="#1F2D3D">import marks (CSV)</text>
  </g>

  <!-- 6 Attainment -->
  <g>
    <rect x="436" y="470" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="472" cy="506" r="18" fill="#0A4A40"/><text x="472" y="513" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">6</text>
    <circle cx="601" cy="555" r="45" fill="#E6F2F0"/>
    <g fill="#0F6B5C">
      <rect x="580" y="560" width="9" height="17" rx="1.5"/>
      <rect x="594" y="550" width="9" height="27" rx="1.5"/>
      <rect x="608" y="540" width="9" height="37" rx="1.5"/>
      <rect x="622" y="530" width="9" height="47" rx="1.5"/>
    </g>
    <line x1="574" y1="580" x2="636" y2="580" stroke="#0F6B5C" stroke-width="3"/>
    <text x="601" y="638" text-anchor="middle" font-size="21" font-weight="700" fill="#0A4A40">Attainment</text>
    <line x1="486" y1="652" x2="716" y2="652" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="601" y="678" text-anchor="middle" font-size="15" fill="#1F2D3D">Direct + indirect (exit survey)</text>
    <text x="601" y="698" text-anchor="middle" font-size="15" fill="#1F2D3D">+ combined CO/PO attainment</text>
  </g>

  <!-- 7 CQI -->
  <g>
    <rect x="832" y="470" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="868" cy="506" r="18" fill="#0A4A40"/><text x="868" y="513" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">7</text>
    <circle cx="997" cy="555" r="45" fill="#E6F2F0"/>
    <g stroke="#0F6B5C" stroke-width="3.5" fill="none" stroke-linecap="round">
      <circle cx="991" cy="549" r="17"/><line x1="1003" y1="561" x2="1018" y2="576"/>
    </g>
    <text x="997" y="638" text-anchor="middle" font-size="21" font-weight="700" fill="#0A4A40">CQI</text>
    <line x1="882" y1="652" x2="1112" y2="652" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="997" y="672" text-anchor="middle" font-size="15" fill="#1F2D3D">Analyze low attainment;</text>
    <text x="997" y="692" text-anchor="middle" font-size="15" fill="#1F2D3D">record actions &amp;</text>
    <text x="997" y="712" text-anchor="middle" font-size="15" fill="#1F2D3D">stakeholder feedback</text>
  </g>

  <!-- 8 Accreditation Documents -->
  <g>
    <rect x="1228" y="470" width="330" height="270" rx="18" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="3"/>
    <circle cx="1264" cy="506" r="18" fill="#0A4A40"/><text x="1264" y="513" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">8</text>
    <circle cx="1393" cy="548" r="42" fill="#E6F2F0"/>
    <g stroke="#0F6B5C" stroke-width="3.5" fill="none" stroke-linecap="round">
      <rect x="1372" y="544" width="42" height="22" rx="3"/>
      <path d="M1379,544 v-14 h28 v14"/>
      <path d="M1379,560 h28 v16 h-28 z" fill="#FFFFFF"/>
      <circle cx="1408" cy="550" r="1.8" fill="#0F6B5C"/>
    </g>
    <text x="1393" y="620" text-anchor="middle" font-size="20" font-weight="700" fill="#0A4A40">Accreditation Documents</text>
    <line x1="1278" y1="634" x2="1508" y2="634" stroke="#9AB8B2" stroke-width="1.5" stroke-dasharray="2 4"/>
    <text x="1393" y="656" text-anchor="middle" font-size="14" fill="#1F2D3D">Print 7 auto-filled documents:</text>
    <text x="1393" y="675" text-anchor="middle" font-size="14" fill="#1F2D3D">Outline, Specifications, Vetting Form,</text>
    <text x="1393" y="694" text-anchor="middle" font-size="14" fill="#1F2D3D">CO-PO Calculations, Exit Survey,</text>
    <text x="1393" y="713" text-anchor="middle" font-size="14" fill="#1F2D3D">Course Report, CQI Report</text>
  </g>

  <!-- ======== FLOW ARROWS (explicit heads for maximum renderer compatibility) ======== -->
  <g stroke="#0F6B5C" stroke-width="5" fill="none" stroke-linecap="round">
    <line x1="374" y1="265" x2="412" y2="265"/>
    <line x1="770" y1="265" x2="808" y2="265"/>
    <line x1="1166" y1="265" x2="1204" y2="265"/>
    <line x1="374" y1="605" x2="412" y2="605"/>
    <line x1="770" y1="605" x2="808" y2="605"/>
    <line x1="1166" y1="605" x2="1204" y2="605"/>
  </g>
  <g fill="#0F6B5C">
    <polygon points="412,257 412,273 426,265"/>
    <polygon points="808,257 808,273 822,265"/>
    <polygon points="1204,257 1204,273 1218,265"/>
    <polygon points="412,597 412,613 426,605"/>
    <polygon points="808,597 808,613 822,605"/>
    <polygon points="1204,597 1204,613 1218,605"/>
  </g>
  <!-- Serpentine connector: 4 -> 5 (down from card 4, left along the corridor, into the top of 5) -->
  <path d="M1393,404 v14 q0,16 -16,16 H237 q-16,0 -16,16 v8" stroke="#0F6B5C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <polygon points="213,458 229,458 221,470" fill="#0F6B5C"/>

  <!-- ======== CQI RETURN LOOP: 8 -> 3 (one arrowhead only) ======== -->
  <path d="M1393,744 v28 q0,16 -16,16 H815 q-16,0 -16,-16 V434 q0,-16 16,-16 h166 q16,0 16,-16 v-2"
        stroke="#C98A1B" stroke-width="6" fill="none" stroke-linecap="round"/>
  <polygon points="988,414 1006,414 997,400" fill="#C98A1B"/>
  <text x="1090" y="820" text-anchor="middle" font-size="20" font-weight="700" fill="#C98A1B">Duplicate for New Semester — CQI loop closed</text>

  <!-- ======== BADGES ======== -->
  <g>
    <rect x="90" y="836" width="400" height="60" rx="14" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="2.5"/>
    <g stroke="#0F6B5C" stroke-width="2.8" fill="none">
      <circle cx="130" cy="866" r="16"/>
      <ellipse cx="130" cy="866" rx="7" ry="16"/>
      <line x1="114" y1="866" x2="146" y2="866"/>
    </g>
    <text x="160" y="860" font-size="17" font-weight="700" fill="#1F2D3D">Single HTML file —</text>
    <text x="160" y="882" font-size="17" fill="#1F2D3D">runs in any browser</text>

    <rect x="600" y="836" width="400" height="60" rx="14" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="2.5"/>
    <g fill="#0F6B5C">
      <path d="M640,850 l14,5 v12 c0,9 -6,15 -14,18 c-8,-3 -14,-9 -14,-18 v-12 z"/>
    </g>
    <rect x="634" y="863" width="12" height="10" rx="2" fill="#FFFFFF"/>
    <path d="M636,863 v-3 a4,4 0 0 1 8,0 v3" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <text x="670" y="860" font-size="17" font-weight="700" fill="#1F2D3D">Data stays</text>
    <text x="670" y="882" font-size="17" fill="#1F2D3D">on your device</text>

    <rect x="1110" y="836" width="400" height="60" rx="14" fill="#FFFFFF" stroke="#0F6B5C" stroke-width="2.5"/>
    <circle cx="1150" cy="866" r="16" stroke="#0F6B5C" stroke-width="2.8" fill="none"/>
    <text x="1150" y="873" text-anchor="middle" font-size="20" font-weight="700" fill="#0F6B5C">C</text>
    <text x="1180" y="860" font-size="17" font-weight="700" fill="#1F2D3D">© Prof. Mazharul Islam</text>
    <text x="1180" y="882" font-size="17" fill="#1F2D3D">CC BY 4.0</text>
  </g>

  <!-- ======== FOOTER ======== -->
  <rect x="480" y="920" width="640" height="40" rx="20" fill="#E6F2F0"/>
  <rect x="600" y="928" width="60" height="24" rx="6" fill="#0A4A40"/>
  <text x="630" y="945" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">v1.4</text>
  <text x="680" y="946" font-size="17" fill="#0A4A40">·  mazhar17.github.io/obe-course-manager</text>
</svg>
