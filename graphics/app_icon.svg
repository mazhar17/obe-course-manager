<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15806E"/>
      <stop offset="1" stop-color="#083A32"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E3A72F"/>
      <stop offset="1" stop-color="#B2761A"/>
    </linearGradient>
    <clipPath id="sq"><rect width="256" height="256" rx="58"/></clipPath>
  </defs>

  <!-- Background squircle -->
  <rect width="256" height="256" rx="58" fill="url(#bg)"/>
  <!-- Soft top sheen (clipped to the squircle) -->
  <ellipse cx="128" cy="34" rx="160" ry="78" fill="#FFFFFF" opacity="0.07" clip-path="url(#sq)"/>

  <!-- CQI orbit arc with arrowhead (continuous improvement) -->
  <path d="M44.9,80 A96,96 0 1 1 176,44.9" fill="none" stroke="#C98A1B" stroke-width="10" stroke-linecap="round"/>
  <polygon points="188,52 172.5,51 179.5,38.8" fill="#C98A1B"/>

  <!-- Target rings (outcomes) -->
  <circle cx="128" cy="128" r="70" fill="none" stroke="#0A4A40" stroke-width="18" opacity="0.35"/>
  <circle cx="128" cy="128" r="70" fill="none" stroke="#E6F2F0" stroke-width="14"/>
  <circle cx="128" cy="128" r="46" fill="none" stroke="#E6F2F0" stroke-width="5" opacity="0.35"/>

  <!-- Centre: attainment -->
  <circle cx="128" cy="133" r="31" fill="#052A24" opacity="0.35"/>
  <circle cx="128" cy="128" r="31" fill="url(#amber)"/>
  <circle cx="128" cy="128" r="31" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25"/>
  <path d="M111,128 l12,12 l22,-26" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
